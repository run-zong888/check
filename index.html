<html lang="zh-CN">

  <title>名单学院查询</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #18202a;
      --muted: #667085;
      --line: #d9dee7;
      --brand: #1463ff;
      --brand-soft: #eaf1ff;
      --ok: #117a37;
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }
    main {
      width: min(980px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 42px 0 60px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    .sub {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 15px;
    }
    .search-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 22px;
      box-shadow: 0 8px 28px rgba(19, 32, 56, 0.06);
    }
    label {
      display: block;
      margin-bottom: 10px;
      font-weight: 700;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }
    input {
      width: 100%;
      height: 48px;
      border: 1px solid #b9c2d0;
      border-radius: 6px;
      padding: 0 14px;
      font-size: 20px;
      outline: none;
      background: #fff;
    }
    input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--brand-soft);
    }
    button {
      height: 48px;
      border: 0;
      border-radius: 6px;
      padding: 0 20px;
      font-weight: 700;
      color: #fff;
      background: var(--brand);
      cursor: pointer;
    }
    .result {
      margin-top: 18px;
      min-height: 126px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      background: #fbfcff;
    }
    .empty {
      color: var(--muted);
      line-height: 1.8;
    }
    .hit {
      display: grid;
      gap: 10px;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }
    .hit:last-child { border-bottom: 0; }
    .name {
      font-size: 26px;
      font-weight: 800;
    }
    .college {
      display: inline-block;
      width: fit-content;
      border-radius: 6px;
      padding: 8px 12px;
      background: #eef8f0;
      color: var(--ok);
      font-size: 22px;
      font-weight: 800;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .tools {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
    }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 12px;
      background: #fff;
      font-size: 14px;
      color: #344054;
    }
    .list {
      margin-top: 22px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .list header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      font-weight: 800;
    }
    .grid {
      max-height: 360px;
      overflow: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    td, th {
      padding: 10px 12px;
      border-bottom: 1px solid #edf0f5;
      text-align: left;
      white-space: nowrap;
    }
    th {
      position: sticky;
      top: 0;
      background: #f9fafb;
      color: #475467;
      z-index: 1;
    }
    mark {
      background: #fff3a3;
      padding: 0 2px;
    }
    @media (max-width: 640px) {
      main { width: min(100vw - 20px, 980px); padding-top: 24px; }
      h1 { font-size: 25px; }
      .row { grid-template-columns: 1fr; }
      button { width: 100%; }
      .name { font-size: 23px; }
      .college { font-size: 19px; }
      td, th { padding: 9px 8px; }
    }
  </style>
</head>
<body>
  <main>
    <h1>名单学院查询</h1>
    <p class="sub">输入姓名，直接返回对应学院类别。支持精确查询，也会显示相近结果方便核对。</p>

    <section class="search-card">
      <label for="q">姓名</label>
      <div class="row">
        <input id="q" autocomplete="off" placeholder="例如：田甜" autofocus>
        <button id="search">查询</button>
      </div>
      <div class="tools">
        <span class="pill" id="count"></span>
        <span class="pill">同名会全部显示</span>
        <span class="pill">可对照序号核验原图</span>
      </div>
      <div class="result" id="result"></div>
    </section>

    <section class="list">
      <header>
        <span>全部名单</span>
        <span id="shown"></span>
      </header>
      <div class="grid">
        <table>
          <thead><tr><th>序号</th><th>姓名</th><th>学院类别</th><th>原图</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </section>
  </main>

    const people = raw.trim().split(/\n+/).map(line => {
      const [seq, name, college, img] = line.split(",");
      return { seq: Number(seq), name, college, img };
    });

    const q = document.querySelector("#q");
    const result = document.querySelector("#result");
    const tbody = document.querySelector("#tbody");
    const count = document.querySelector("#count");
    const shown = document.querySelector("#shown");

    function normalize(text) {
      return String(text || "").replace(/\s+/g, "").replace(/[·・]/g, "·");
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, ch => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      })[ch]);
    }

    function renderTable(rows, keyword = "") {
      const key = normalize(keyword);
      tbody.innerHTML = rows.map(p => {
        const name = key && normalize(p.name).includes(key)
          ? escapeHtml(p.name).replace(escapeHtml(keyword), `<mark>${escapeHtml(keyword)}</mark>`)
          : escapeHtml(p.name);
        return `<tr>
          <td>${p.seq}</td>
          <td>${name}</td>
          <td>${escapeHtml(p.college)}</td>
          <td>${escapeHtml(p.img)}</td>
        </tr>`;
      }).join("");
      shown.textContent = `显示 ${rows.length} 人`;
    }

    function search() {
      const key = normalize(q.value);
      if (!key) {
        result.innerHTML = `<div class="empty">请输入姓名。比如输入 <b>田甜</b>，会显示“自动化学院本科”。</div>`;
        renderTable(people);
        return;
      }
      const exact = people.filter(p => normalize(p.name) === key);
      const fuzzy = exact.length ? exact : people.filter(p => normalize(p.name).includes(key));
      if (!fuzzy.length) {
        result.innerHTML = `<div class="empty">没有找到“${escapeHtml(q.value)}”。请检查是否有空格、同音字或繁简差异。</div>`;
        renderTable([]);
        return;
      }
      result.innerHTML = fuzzy.map(p => `<div class="hit">
        <div class="name">${escapeHtml(p.name)}</div>
        <div class="college">${escapeHtml(p.college)}</div>
        <div class="meta">序号 ${p.seq}，原图：${escapeHtml(p.img)}</div>
      </div>`).join("");
      renderTable(fuzzy, q.value);
    }

    document.querySelector("#search").addEventListener("click", search);
    q.addEventListener("input", search);
    q.addEventListener("keydown", event => {
      if (event.key === "Enter") search();
    });

    count.textContent = `已录入 ${people.length} 人`;
    search();
  </script>
